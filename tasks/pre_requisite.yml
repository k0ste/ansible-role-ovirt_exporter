---
- name: "ovirt_exporter | Assert that ansible facts gathered successfully"
  ansible.builtin.assert:
    that:
      - "hostvars[inventory_hostname]['ansible_facts']['service_mgr'] is
        defined"
    fail_msg: "'ansible_facts' not found. Please enable facts gathering"
    quiet: "true"
- name: "ovirt_exporter | Assert that system manager is systemd"
  ansible.builtin.assert:
    that:
      - "hostvars[inventory_hostname]['ansible_facts']['service_mgr'] ==
        'systemd'"
    fail_msg: "System manager is not systemd"
    quiet: "true"
- name: "ovirt_exporter | Add the OS specific variables"
  ansible.builtin.include_vars:
    file: "{{ hostvars[inventory_hostname]['ansible_facts']['os_family'] +
      '.yml' }}"
- name: "ovirt_exporter | Set facts about ovirt_exporter role"
  ansible.builtin.set_fact:
    ovirt_exporter_version:
      "{{ hostvars[inventory_hostname]['ovirt_exporter'] |
      community.general.json_query('[].version | [0]')}}"
    ovirt_exporter_settings:
      "{{ hostvars[inventory_hostname]['ovirt_exporter'] |
      community.general.json_query('[].settings | [0]') }}"
    ovirt_exporter_package_state:
      "{{ hostvars[inventory_hostname]['ovirt_exporter'] |
      community.general.json_query('[].package_state | [0]') }}"
  when:
    - "hostvars[inventory_hostname]['ovirt_exporter'] is defined"
    - "hostvars[inventory_hostname]['ovirt_exporter']
      not in ['', [], '[]', None]"
- name: "ovirt_exporter | Assert that ovirt_exporter package state in
    valid value"
  ansible.builtin.assert:
    that:
      - "lookup('ansible.builtin.vars', 'ovirt_exporter_package_state') in
        ['present', 'latest']"
    fail_msg: "{{ 'package_state must be in `present` or `latest`,
      current is: ' + lookup('ansible.builtin.vars',
      'ovirt_exporter_package_state') }}"
    quiet: "true"
  when:
    - "lookup('ansible.builtin.vars', 'ovirt_exporter_package_state',
      default='') not in ['', [], '[]', None, 'present', 'latest']"
- name: "ovirt_exporter | Set package state to 'present' cause value is not
    defined"
  ansible.builtin.set_fact:
    ovirt_exporter_package_state: "present"
  when:
    - "lookup('ansible.builtin.vars', 'ovirt_exporter_package_state',
      default='') in ['', [], '[]', None]"
- name: "ovirt_exporter | Get last release version from Github"
  community.general.github_release:
    user: "czerwonk"
    repo: "ovirt_exporter"
    action: "latest_release"
  run_once: true
  register: "ovirt_exporter_version_tag"
  delegate_to: "localhost"
  when:
    - "lookup('ansible.builtin.vars', 'ovirt_exporter_version',
      default='') == 'latest'"
    - "hostvars[inventory_hostname]['ovirt_exporter'] is defined"
    - "hostvars[inventory_hostname]['ovirt_exporter']
      not in ['', [], '[]', None]"
    - "hostvars[inventory_hostname]['ovirt_exporter'] |
       community.general.json_query(lookup('ansible.builtin.vars',
      'ovirt_exporter_install_package', default='')) == 'false'"
  vars:
    ovirt_exporter_install_package: "[] |
      map(&install_package || 'false', @) | [0]"
- name: "ovirt_exporter | Set facts about ovirt_exporter role"
  ansible.builtin.set_fact:
    ovirt_exporter_package_state: "present"
    ovirt_exporter_version: "{{ lookup('ansible.builtin.vars',
      'ovirt_exporter_version_tag')['tag'][1:] }}"
  when:
    - "lookup('ansible.builtin.vars', 'ovirt_exporter_version_tag',
      default='') not in ['', [], '[]', None]"
    - "not lookup('ansible.builtin.vars',
      'ovirt_exporter_version_tag')['skipped']"
- name: "ovirt_exporter | Create ovirt_exporter catalog"
  ansible.builtin.file:
    path: "{{ hostvars[inventory_hostname]['ovirt_exporter_dest'] }}"
    state: "directory"
    owner: "root"
    group: "root"
    mode: "0755"
  when:
    - "hostvars[inventory_hostname]['ovirt_exporter'] is defined"
    - "hostvars[inventory_hostname]['ovirt_exporter']
      not in ['', [], '[]', None]"
    - "hostvars[inventory_hostname]['ovirt_exporter'] |
       community.general.json_query(lookup('ansible.builtin.vars',
      'ovirt_exporter_install_package', default='')) == 'false'"
  vars:
    ovirt_exporter_install_package: "[] |
      map(&install_package || 'false', @) | [0]"
