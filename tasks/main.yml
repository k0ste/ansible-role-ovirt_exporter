---
- name: "ovirt_exporter | Include pre requisite tasks"
  ansible.builtin.import_tasks:
    file: "pre_requisite.yml"
- name: "ovirt_exporter | Include packages tasks [package deployment]"
  ansible.builtin.include_tasks:
    file: "packages.yml"
  when:
    - "lookup('ansible.builtin.vars', 'ovirt_exporter', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'ovirt_exporter') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'ovirt_exporter_install_package', default='')) == 'true'"
  vars:
    ovirt_exporter_install_package: "[] |
      map(&install_package || 'false', @) | [0]"
    ovirt_exporter_pacakges_variant: "{{ lookup('ansible.builtin.vars',
      'ovirt_exporter_package') }}"
- name: "ovirt_exporter | Include packages tasks [not package deployment]"
  ansible.builtin.include_tasks:
    file: "download.yml"
  when:
    - "lookup('ansible.builtin.vars', 'ovirt_exporter', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'ovirt_exporter') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'ovirt_exporter_install_package', default='')) == 'false'"
  vars:
    ovirt_exporter_install_package: "[] |
      map(&install_package || 'false', @) | [0]"
- name: "ovirt_exporter | Include deployment tasks"
  ansible.builtin.import_tasks:
    file: "deploy.yml"
