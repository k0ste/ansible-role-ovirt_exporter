---
- name: "ovirt_exporter | Daemon reload"
  ansible.builtin.systemd:
    daemon_reload: "yes"
  listen: "Daemon reload"
- name: "ovirt_exporter | Restart ovirt_exporter"
  ansible.builtin.systemd:
    name: "{{ lookup('ansible.builtin.vars', 'ovirt_exporter_service') }}"
    state: "restarted"
  listen: "Restart ovirt_exporter"
  when:
    - "lookup('ansible.builtin.vars', 'ovirt_exporter', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'ovirt_exporter') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'ovirt_exporter_restart', default='')) == 'true'"
  vars:
    ovirt_exporter_restart: "[] | map(&restart || 'false', @) | [0]"
